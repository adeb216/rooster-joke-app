<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooster Joke</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .container {
            text-align: center;
            background: rgba(255,255,255,0.9);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 500px;
        }
        h1 {
            color: #d35400;
            margin-bottom: 1rem;
        }
        .joke {
            font-size: 1.5rem;
            color: #2c3e50;
            margin-top: 1rem;
        }
        .rooster {
            font-size: 5rem;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐓 Rooster Joke 🐓</h1>
        <div class="rooster">🐓</div>
        <p class="joke">Why did the rooster go to the seance?</p>
        <p class="joke">To talk to the dead!</p>
        <p class="joke">(Get it? Because he wanted to talk to the "poultrygeist"!)</p>
    </div>
</body>
</html>
